name: MongoDB Keepalive

# Free MongoDB Atlas (M0) clusters are paused/expired after a period of
# inactivity. This workflow pings the cluster on a schedule to keep it alive.
on:
  schedule:
    # Every 5 days at 06:00 UTC — comfortably under the 30-day inactivity limit.
    - cron: "0 6 */5 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ping MongoDB
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: node scripts/keepalive.mjs
